name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "haoayou-legado-github-build.zip"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          rm -rf source
          mkdir source
          unzip -q haoayou-legado-github-build.zip -d source
          ls -la source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        working-directory: source/legado-3.26.030717
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleAppRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: haoayou-apk
          path: source/legado-3.26.030717/app/build/outputs/apk/**/*.apk
